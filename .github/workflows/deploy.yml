name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: dataworksai

jobs:
  # ── Build & push all three images ───────────────────────────────────────────
  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push registry image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.registry
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/agent-registry:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/agent-registry:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push agentns image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agentns
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/agentns:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/agentns:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push control-plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.control
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/control-plane:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/control-plane:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to production server ──────────────────────────────────────────────
  deploy:
    name: Deploy to 97.107.132.213
    needs: build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/agent-registry

            # Pull latest compose file
            curl -fsSL \
              https://raw.githubusercontent.com/dataworksai/agent-registry/main/docker-compose.saas.yml \
              -o docker-compose.saas.yml

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull & restart all services (zero-downtime rolling update)
            docker compose -f docker-compose.saas.yml pull
            docker compose -f docker-compose.saas.yml up -d --remove-orphans

            # Health check
            sleep 10
            curl -sf http://localhost:6900/health || (echo "Registry health check failed" && exit 1)
            curl -sf http://localhost:8080/health || (echo "Control plane health check failed" && exit 1)
            echo "✅ Deploy successful"

  # ── Run tests ────────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx pytest pytest-asyncio slowapi pyyaml

      - name: Run agentns tests
        env:
          AGENTNS_TLD: agentns.local
          AGENTNS_AUTH: "off"
        run: |
          pytest tests/ -v --tb=short
