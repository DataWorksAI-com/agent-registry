name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: dataworksai-com

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agentns/requirements.txt pytest pytest-asyncio

      - name: Run tests
        env:
          AGENTNS_TLD: agentns.local
          DANS_AUTH: "off"
        run: pytest tests/ -v --tb=short

  # ── Build & push ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push agentns image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agentns
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/agentns:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/agentns:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to 97.107.132.213
    needs: build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/agent-registry/src

            # Upload updated server files
            # (volume-mounted into container — no image rebuild needed)
            docker compose -f docker-compose.atlas.yml up -d --no-deps --force-recreate agentns

            # Health check
            sleep 8
            curl -sf http://localhost:8200/health || (echo "agentns health check failed" && exit 1)
            echo "Deploy successful"
