# docker-compose.yml — Local development (in-memory, no MongoDB required)
# For a persistent deployment use docker-compose.dans.yml
version: "3.9"

services:
  agentns:
    build:
      context: .
      dockerfile: Dockerfile.agentns
    ports:
      - "8200:8200"
    environment:
      - AGENTNS_TLD=agentns.local
      - AGENTNS_NAMESPACE=default
      - DANS_AUTH=off
      # Uncomment to wire a fallback registry:
      # - ANS_FALLBACK_URL=http://your-registry:6900
    restart: unless-stopped
